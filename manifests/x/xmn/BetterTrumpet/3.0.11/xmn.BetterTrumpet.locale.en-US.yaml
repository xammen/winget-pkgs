- eartrumpet
- windows
ReleaseNotes: |-
  - Added per-app hide/restore controls, including middle-click hide and per-device restore menus
  - Added Ctrl+click solo mute for app rows, plus a fix for solo state restoration on close
  - Added a classic setting to toggle icon tooltips, with media popup-aware tooltip placement
